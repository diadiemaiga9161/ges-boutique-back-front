<div class="card o-hidden" [@animate]="{value:'*',params:{y:'120px',opacity:'0',delay:'100ms', duration: '400ms'}}">
  <div class="row me-0">
    <div class="col-md-6">
      <div class="p-4">
        <div class="auth-logo text-center mb-4">
          <img [src]="logoPath" alt="Logo" *ngIf="logoPath" style="max-height:60px">
        </div>
        <h1 class="mb-1 text-18">Mot de passe oublié</h1>
        <p class="text-muted mb-4" style="font-size:0.85rem">Saisissez votre email, vous recevrez un lien pour réinitialiser votre mot de passe.</p>

        <!-- Succès -->
        <div *ngIf="successMessage" class="alert alert-success d-flex align-items-center">
          <i class="i-Check mr-2"></i>
          <span>{{ successMessage }}</span>
        </div>

        <!-- Erreur -->
        <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

        <form (ngSubmit)="submit()" *ngIf="!successMessage">
          <div class="form-group mb-3">
            <label for="email">Adresse email</label>
            <input id="email" class="form-control form-control-rounded"
              type="email" [(ngModel)]="email" name="email"
              placeholder="votre@email.com" required>
          </div>
          <button class="btn btn-primary w-100 btn-rounded mt-2" type="submit" [disabled]="isLoading">
            <span *ngIf="isLoading" class="spinner-border spinner-border-sm mr-2"></span>
            <i class="i-Mail-with-At-Sign mr-1" *ngIf="!isLoading"></i>
            {{ isLoading ? 'Envoi en cours...' : 'Envoyer le lien' }}
          </button>
        </form>

        <div class="mt-3 text-center">
          <a class="text-muted" routerLink="/sessions/connexion"><u>Retour à la connexion</u></a>
        </div>
      </div>
    </div>
    <div class="col-md-6 text-center d-none d-md-flex align-items-center justify-content-center"
      style="background: linear-gradient(135deg,#1d4ed8,#2563eb)">
      <div class="text-white p-4">
        <i class="i-Lock-2" style="font-size:4rem;opacity:0.8"></i>
        <h3 class="mt-3" style="font-weight:700">Sécurité du compte</h3>
        <p style="opacity:0.8;font-size:0.9rem">Un lien sécurisé vous sera envoyé.<br>Vérifiez votre boîte mail.</p>
      </div>
    </div>
  </div>
</div>
