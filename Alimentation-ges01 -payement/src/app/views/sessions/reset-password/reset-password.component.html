<div class="card o-hidden" style="max-width:480px;margin:60px auto">
  <div class="card-header text-center py-4" style="background:linear-gradient(135deg,#1d4ed8,#2563eb)">
    <h2 class="text-white mb-0" style="font-weight:700">🔐 Nouveau mot de passe</h2>
    <p class="text-white mb-0" style="opacity:0.8;font-size:0.85rem">MG Boutique</p>
  </div>
  <div class="p-4">

    <!-- Token invalide -->
    <div *ngIf="tokenValide === false" class="text-center py-4">
      <i class="i-Error-404" style="font-size:3rem;color:#ef4444"></i>
      <p class="mt-3 text-danger font-weight-bold">Lien invalide ou expiré</p>
      <p class="text-muted" style="font-size:0.85rem">Ce lien de réinitialisation n'est plus valide. Veuillez refaire une demande.</p>
      <a class="btn btn-primary btn-rounded mt-2" routerLink="/sessions/forgot">Nouvelle demande</a>
    </div>

    <!-- Succès -->
    <div *ngIf="successMessage" class="text-center py-4">
      <i class="i-Check-2" style="font-size:3rem;color:#16a34a"></i>
      <p class="mt-3 text-success font-weight-bold">{{ successMessage }}</p>
      <p class="text-muted" style="font-size:0.85rem">Redirection vers la connexion dans 3 secondes...</p>
    </div>

    <!-- Formulaire -->
    <form (ngSubmit)="submit()" *ngIf="tokenValide && !successMessage">
      <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

      <div class="form-group mb-3">
        <label>Nouveau mot de passe</label>
        <input class="form-control form-control-rounded" type="password"
          [(ngModel)]="password" name="password"
          placeholder="Minimum 6 caractères" required>
      </div>
      <div class="form-group mb-3">
        <label>Confirmer le mot de passe</label>
        <input class="form-control form-control-rounded" type="password"
          [(ngModel)]="confirm" name="confirm"
          placeholder="Répéter le mot de passe" required>
      </div>
      <button class="btn btn-primary w-100 btn-rounded mt-2" type="submit" [disabled]="isLoading">
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm mr-2"></span>
        {{ isLoading ? 'Enregistrement...' : 'Modifier le mot de passe' }}
      </button>
    </form>

    <div class="text-center mt-3" *ngIf="tokenValide !== false">
      <a class="text-muted" routerLink="/sessions/connexion"><u>Retour à la connexion</u></a>
    </div>
  </div>
</div>
