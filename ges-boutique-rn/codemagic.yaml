workflows:

  android-workflow:
    name: Ges Boutique RN - Android APK
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: ges-boutique-rn

    environment:
      node: 22.16.0
      java: 17

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Expo prebuild Android
        script: npx expo prebuild --platform android --clean

      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - ges-boutique-rn/android/app/build/outputs/apk/debug/app-debug.apk

    publishing:
      email:
        recipients:
          - doumaiga3@gmail.com
        notify:
          success: true
          failure: true
