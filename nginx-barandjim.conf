server {
    listen 80;
    server_name barandjim.mg-consulting.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name barandjim.mg-consulting.site;

    # Certificats SSL (Let's Encrypt ou autre)
    ssl_certificate     /etc/letsencrypt/live/barandjim.mg-consulting.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/barandjim.mg-consulting.site/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Tout est proxié vers Spring Boot (Angular + Ionic + API dans le même JAR)
    location / {
        proxy_pass         http://localhost:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # WebSocket STOMP (SockJS) — nécessite Upgrade
    location /ws {
        proxy_pass         http://localhost:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }
}
